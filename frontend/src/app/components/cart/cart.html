<div class="page">
  <h1>🛒 Your Cart</h1>

  <div *ngIf="items.length === 0" class="empty">
    <p>Your cart is empty.</p>
    <a routerLink="/products" class="btn-continue">Continue Shopping</a>
  </div>

  <div *ngIf="items.length > 0">
    <div class="cart-item" *ngFor="let item of items">
      <img [src]="item.product.image" [alt]="item.product.name" />
      <div class="item-info">
        <h3>{{ item.product.name }}</h3>
        <p class="category">{{ item.product.category }}</p>
      </div>
      <div class="item-quantity">x{{ item.quantity }}</div>
      <div class="item-price">${{ (item.product.price * item.quantity).toFixed(2) }}</div>
      <button (click)="remove(item.product.id)" class="btn-remove">Remove</button>
    </div>

    <div class="cart-footer">
      <span class="total">Total: ${{ total.toFixed(2) }}</span>
      <div class="footer-actions">
        <a routerLink="/products" class="btn-continue">Continue Shopping</a>
        <a routerLink="/checkout" class="btn-checkout">Checkout</a>
      </div>
    </div>
  </div>
</div>
